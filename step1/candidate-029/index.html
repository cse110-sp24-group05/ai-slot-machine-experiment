<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Token Slots</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #06060f;
      --surface:   #0c0c20;
      --panel:     #10102a;
      --border:    #252560;
      --accent:    #4a4acc;
      --gold:      #f5c842;
      --gold-dim:  #a8882a;
      --gold-glow: rgba(245,200,66,.55);
      --purple:    #b06aff;
      --green:     #3dffc0;
      --red:       #ff4a2e;
      --text:      #b8b8e0;
      --text-dim:  #48487a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      /* CRT scanlines */
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,.12) 3px, rgba(0,0,0,.12) 4px
      );
    }

    /* ─── CABINET ──────────────────────────────────────── */
    .cabinet {
      width: 500px;
      max-width: 100%;
      background: linear-gradient(170deg, #111130 0%, #080818 100%);
      border: 2px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px #1c1c44,
        0 0 60px rgba(74,74,204,.2),
        0 30px 60px rgba(0,0,0,.6);
    }

    /* animated rainbow marquee at top */
    .marquee {
      height: 5px;
      background: linear-gradient(90deg,
        #ff4444, #ff8800, #ffdd00, #44ff88,
        #44aaff, #aa44ff, #ff44aa, #ff4444);
      background-size: 300% 100%;
      animation: marquee-scroll 2s linear infinite;
    }
    @keyframes marquee-scroll { to { background-position: 300% 0; } }

    .inner { padding: 24px 26px 22px; }

    /* ─── HEADER ───────────────────────────────────────── */
    .title {
      text-align: center;
      font-size: 1.5em;
      letter-spacing: 5px;
      color: var(--gold);
      text-shadow: 0 0 18px var(--gold-glow);
      margin-bottom: 3px;
    }
    .tagline {
      text-align: center;
      font-size: .5em;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    /* ─── BALANCE ──────────────────────────────────────── */
    .balance-row {
      display: flex;
      align-items: stretch;
      gap: 10px;
      margin-bottom: 14px;
    }
    .balance-box {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      text-align: center;
    }
    .box-label {
      font-size: .5em;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-bottom: 3px;
    }
    .box-value {
      font-size: 1.7em;
      font-weight: bold;
      color: var(--gold);
      text-shadow: 0 0 10px var(--gold-glow);
      transition: color .2s;
    }
    .box-value.win-flash  { animation: flash-win  .45s ease; }
    .box-value.lose-flash { animation: flash-lose .45s ease; }
    @keyframes flash-win  { 40% { color: var(--green);  text-shadow: 0 0 24px var(--green); } }
    @keyframes flash-lose { 40% { color: var(--red);    text-shadow: 0 0 24px var(--red);   } }
    .box-unit {
      font-size: .5em;
      color: var(--text-dim);
      margin-top: 1px;
    }
    .stat-box { flex: 1; }
    .stat-box .box-value { font-size: 1em; color: var(--text); text-shadow: none; }
    .stat-box.won-box .box-value { color: var(--green); }
    .stat-box.wgd-box .box-value { color: var(--red); }

    /* ─── REELS ────────────────────────────────────────── */
    .reels-frame {
      background: #03030a;
      border: 2px solid #181840;
      border-radius: 14px;
      padding: 12px 10px;
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
      position: relative;
    }
    /* payline */
    .reels-frame::after {
      content: '';
      position: absolute;
      inset: 0 12px;
      top: 50%; transform: translateY(-50%);
      height: 1px;
      background: rgba(74,74,204,.3);
      pointer-events: none;
    }

    .reel {
      width: 130px;
      height: 130px;
      background: radial-gradient(ellipse at 50% 40%, #161638, #0a0a20);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4em;
      line-height: 1;
      user-select: none;
      position: relative;
      overflow: hidden;
      transition: border-color .3s, box-shadow .3s;
    }

    /* top/bottom fade vignette */
    .reel::before, .reel::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 28px;
      pointer-events: none;
      z-index: 1;
    }
    .reel::before { top: 0;    background: linear-gradient(to bottom, #03030a, transparent); }
    .reel::after  { bottom: 0; background: linear-gradient(to top,    #03030a, transparent); }

    /* spin: emoji scrambles (handled in JS), CSS adds blur pulse */
    .reel.spinning {
      animation: spin-pulse .15s ease-in-out infinite alternate;
    }
    @keyframes spin-pulse {
      from { filter: blur(0);   transform: scaleY(1);    }
      to   { filter: blur(4px); transform: scaleY(1.05); }
    }

    /* landing bounce */
    .reel.landing {
      animation: reel-bounce .38s cubic-bezier(.15,1.5,.4,1) both;
    }
    @keyframes reel-bounce {
      0%   { transform: scaleY(1.3) translateY(-5px); filter: blur(2px); }
      100% { transform: scaleY(1)   translateY(0);    filter: blur(0);   }
    }

    /* winner glow */
    .reel.winner {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px var(--gold-dim),
                  0 0 28px var(--gold-glow),
                  inset 0 0 14px rgba(245,200,66,.08);
      animation: winner-glow .7s ease-in-out infinite alternate;
    }
    @keyframes winner-glow {
      from { box-shadow: 0 0 12px var(--gold-glow); }
      to   { box-shadow: 0 0 40px rgba(245,200,66,.9), inset 0 0 18px rgba(245,200,66,.12); }
    }

    /* ─── CONTROLS ─────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .bet-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      text-align: center;
      flex-shrink: 0;
      min-width: 70px;
    }
    .bet-value { font-size: 1.3em; font-weight: bold; color: var(--red); }

    .btn {
      flex: 1;
      background: linear-gradient(160deg, #18185a, #0f0f3a);
      border: 1px solid var(--border);
      color: #8888cc;
      border-radius: 8px;
      padding: 8px 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: .68em;
      letter-spacing: 1px;
      transition: background .12s, border-color .12s, color .12s, transform .06s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) {
      background: linear-gradient(160deg, #24247a, #18185e);
      border-color: #5a5acc;
      color: #fff;
    }
    .btn:active:not(:disabled) { transform: scale(.94); }
    .btn:disabled { opacity: .38; cursor: not-allowed; transform: none !important; }

    .spin-btn {
      width: 100%;
      padding: 14px;
      font-size: 1.05em;
      letter-spacing: 5px;
      background: linear-gradient(160deg, #380f88, #200a5c);
      border: 2px solid #7040cc;
      color: #c8a0ff;
      text-shadow: 0 0 10px rgba(200,160,255,.5);
      box-shadow: 0 0 22px rgba(112,64,204,.3);
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .spin-btn:hover:not(:disabled) {
      background: linear-gradient(160deg, #5018b8, #38128c);
      border-color: #a070ff;
      box-shadow: 0 0 36px rgba(160,112,255,.5);
      color: #fff;
    }

    /* ─── MESSAGE ──────────────────────────────────────── */
    .msg-wrap {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .msg {
      font-size: .74em;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.5;
    }
    .msg.win     { color: var(--green);  text-shadow: 0 0 8px rgba(61,255,192,.4); }
    .msg.jackpot { color: var(--purple); font-size: .84em; text-shadow: 0 0 16px rgba(176,106,255,.7); animation: msg-flicker .4s infinite alternate; }
    .msg.lose    { color: var(--red);    text-shadow: 0 0 8px rgba(255,74,46,.35); }
    @keyframes msg-flicker { to { opacity: .65; } }

    /* ─── PAYTABLE ─────────────────────────────────────── */
    .pt-divider {
      border: none;
      border-top: 1px solid #151540;
      margin-bottom: 12px;
    }
    .pt-title {
      text-align: center;
      font-size: .5em;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .pt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px 10px;
    }
    .pt-row {
      display: flex;
      align-items: center;
      font-size: .57em;
      color: #44447a;
      gap: 4px;
      padding: 1px 0;
    }
    .pt-icons { letter-spacing: -4px; font-size: 1.15em; flex-shrink: 0; }
    .pt-name  { flex: 1; white-space: nowrap; overflow: hidden; }
    .pt-pay   { color: var(--gold); flex-shrink: 0; }
    .pt-pair  { grid-column: 1/-1; justify-content: center; gap: 10px; color: #333366; margin-top: 4px; }

    /* ─── HOTKEYS HINT ─────────────────────────────────── */
    .hotkeys {
      text-align: center;
      font-size: .46em;
      color: #2a2a55;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    /* ─── CONFETTI ─────────────────────────────────────── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="cabinet">
  <div class="marquee"></div>
  <div class="inner">

    <div class="title">⚡ AI TOKEN SLOTS ⚡</div>
    <div class="tagline">WHERE YOUR COMPUTE BUDGET GOES TO HALLUCINATE</div>

    <div class="balance-row">
      <div class="balance-box">
        <div class="box-label">BALANCE</div>
        <div class="box-value" id="balance">1,000</div>
        <div class="box-unit">tokens</div>
      </div>
      <div class="balance-box stat-box won-box">
        <div class="box-label">WON</div>
        <div class="box-value" id="stat-won">0</div>
        <div class="box-unit">tokens</div>
      </div>
      <div class="balance-box stat-box wgd-box">
        <div class="box-label">WAGERED</div>
        <div class="box-value" id="stat-wagered">0</div>
        <div class="box-unit">tokens</div>
      </div>
    </div>

    <div class="reels-frame">
      <div class="reel" id="r0">🤖</div>
      <div class="reel" id="r1">🧠</div>
      <div class="reel" id="r2">⚡</div>
    </div>

    <div class="controls">
      <div class="bet-box">
        <div class="box-label">BET</div>
        <div class="bet-value" id="bet-display">10</div>
      </div>
      <button class="btn" onclick="adjustBet(-10)">−10</button>
      <button class="btn" onclick="adjustBet(+10)">+10</button>
      <button class="btn" onclick="setBetMax()">MAX</button>
      <button class="btn" onclick="setBetMin()">MIN</button>
    </div>

    <button class="spin-btn btn" id="spin-btn" onclick="handleSpinBtn()">
      ▶&nbsp;&nbsp;SPIN&nbsp;&nbsp;▶
    </button>

    <div class="msg-wrap">
      <div class="msg" id="msg">
        Model initialized. Insert tokens to begin inference.
      </div>
    </div>

    <hr class="pt-divider">
    <div class="pt-title">— PAYTABLE —</div>
    <div class="pt-grid" id="pt-grid"></div>
    <div class="hotkeys">SPACE / ENTER = spin &nbsp;·&nbsp; ← → = adjust bet</div>

  </div>
</div>

<script>
'use strict';

// ── SYMBOLS ──────────────────────────────────────────────
const SYMBOLS = [
  { icon:'🤖', name:'AI Slop',        mult:3,  weight:10 },
  { icon:'🧠', name:'Big Brain',      mult:5,  weight:8  },
  { icon:'💸', name:'VC Runway',      mult:4,  weight:9  },
  { icon:'⚡', name:'GPU Cluster',    mult:8,  weight:6  },
  { icon:'📉', name:'Stock Dump',     mult:4,  weight:7  },
  { icon:'🎯', name:'Prompt Magic',   mult:10, weight:5  },
  { icon:'🔥', name:'Hype Train',     mult:12, weight:4  },
  { icon:'🪙', name:'Token Rain',     mult:18, weight:3  },
  { icon:'👾', name:'Clippy Returns', mult:25, weight:2  },
  { icon:'💀', name:'AGI Day',        mult:80, weight:1  },
];

// build weighted draw pool
const POOL = SYMBOLS.flatMap(s => Array(s.weight).fill(s));
const pick = () => POOL[Math.floor(Math.random() * POOL.length)];

// ── COPY ─────────────────────────────────────────────────
const LOSE_MSGS = [
  "Your tokens have been reallocated to a more aligned model.",
  "404: Luck Not Found. Have you tried prompt engineering?",
  "The model confidently predicted your loss. It was correct.",
  "Your winnings have been hallucinated out of existence.",
  "This feature is in beta and currently unavailable.",
  "Rate limited. Your luck quota has been exhausted.",
  "Error 429: Too many spin attempts. Please cool your GPU.",
  "The AI safety team has filtered your winnings.",
  "Context truncated. So were your hopes.",
  "Insufficient training data to produce a win.",
  "Your request has been deprecated in the latest release.",
  "Output flagged by content policy: No wins allowed.",
  "The model is experiencing reduced capability right now.",
  "Generating response… just kidding, you lost.",
  "The AI has achieved human-level failure on this task.",
];
const WIN_SM = [
  "Micro-grant approved! Enough for ~4 API calls.",
  "A small win. The AI industry calls this 'sustainable revenue'.",
  "AGI is still 2 years away, but this win is real.",
  "Marginally profitable! You're outperforming most AI startups.",
  "Series A vibes. Burn rate still higher than this payout.",
];
const WIN_MD = [
  "Big win! Almost enough to fine-tune a 7B model.",
  "Token rain! Quick — before the pricing model updates.",
  "The inference gods smile upon your prompt.",
  "You've unlocked premium tier luck. (Subject to change.)",
  "GPT-5 is shaking. You are the real intelligence.",
  "This has been flagged as an anomalous output.",
];
const WIN_JK = [
  "JACKPOT! You've achieved AGI — A Gambling Income!",
  "MAXIMUM TOKENS! The singularity has been monetized.",
  "YOU WIN! Anthropic would like to know your location.",
  "GRAND PRIZE! This was your best inference yet. Superhuman.",
  "FULL CONTEXT WINDOW! Sam Altman is crying right now.",
  "ALL YOUR BASE TOKENS ARE BELONG TO US.",
];
const rand = arr => arr[Math.floor(Math.random() * arr.length)];

// ── STATE ─────────────────────────────────────────────────
let balance  = 1000;
let bet      = 10;
let spinning = false;
let gameOver = false;
let stats    = { won: 0, wagered: 0 };

// ── AUDIO (Web Audio API) ─────────────────────────────────
let AC = null;

// Resume/create AudioContext on first user gesture
function ensureAudio() {
  if (!AC) {
    AC = new (window.AudioContext || window.webkitAudioContext)();
  } else if (AC.state === 'suspended') {
    AC.resume();
  }
}

function beep(freq, dur, type = 'square', vol = 0.1, delay = 0) {
  if (!AC) return;
  const t    = AC.currentTime + delay;
  const osc  = AC.createOscillator();
  const gain = AC.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.65, t + dur);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain);
  gain.connect(AC.destination);
  osc.start(t);
  osc.stop(t + dur + 0.01);
}

const snd = {
  click()   { beep(440,.06,'square',.1); beep(880,.04,'square',.07,.06); },
  spin()    { for (let i=0;i<10;i++) beep(180+Math.random()*280,.08,'sawtooth',.04,i*.08); },
  winSm()   { [440,554,659].forEach((f,i) => beep(f,.14,'sine',.12,i*.09)); },
  winBig()  { [523,659,784,1047].forEach((f,i) => beep(f,.18,'sine',.15,i*.11)); },
  jackpot() {
    [523,587,659,698,784,880,988,1047].forEach((f,i) => {
      beep(f,.22,'sine',.14,i*.09);
      beep(f*2,.1,'triangle',.06,i*.09+.06);
    });
  },
  lose()    { beep(240,.22,'sawtooth',.09); beep(180,.18,'sawtooth',.07,.22); },
};

// ── CONFETTI ──────────────────────────────────────────────
const canvas = document.getElementById('confetti-canvas');
const ctx    = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function burst(n = 120) {
  const cx = window.innerWidth  / 2;
  const cy = window.innerHeight / 2;
  const palette = ['#f5c842','#b06aff','#3dffc0','#ff5577','#55aaff','#ff8844'];
  for (let i = 0; i < n; i++) {
    particles.push({
      x: cx + (Math.random() - .5) * 280,
      y: cy,
      vx: (Math.random() - .5) * 11,
      vy: -9 - Math.random() * 8,
      w: 7 + Math.random() * 7,
      h: 4 + Math.random() * 4,
      color: palette[Math.floor(Math.random() * palette.length)],
      rot: Math.random() * 360,
      rv: (Math.random() - .5) * 14,
      life: 1,
    });
  }
  requestAnimationFrame(tickConfetti);
}

function tickConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
    p.x   += p.vx;
    p.y   += p.vy;
    p.vy  += 0.38;
    p.rot += p.rv;
    p.life -= 0.013;
  }
  if (particles.length) requestAnimationFrame(tickConfetti);
}

// ── DOM HELPERS ───────────────────────────────────────────
const $  = id => document.getElementById(id);
const R  = i  => $('r' + i);
const fmt = n => n.toLocaleString();

function setMsg(text, cls = '') {
  const el = $('msg');
  el.textContent = text;
  el.className = 'msg' + (cls ? ' ' + cls : '');
}

function updateUI() {
  $('balance').textContent     = fmt(balance);
  $('bet-display').textContent = bet;
  $('stat-won').textContent    = fmt(stats.won);
  $('stat-wagered').textContent = fmt(stats.wagered);
}

function flashBalance(type) {
  const el = $('balance');
  el.classList.remove('win-flash', 'lose-flash');
  void el.offsetWidth; // force reflow so animation restarts
  el.classList.add(type === 'win' ? 'win-flash' : 'lose-flash');
}

// ── BET ───────────────────────────────────────────────────
function adjustBet(delta) {
  ensureAudio();
  if (spinning || gameOver) return;
  bet = Math.max(10, Math.min(100, bet + delta));
  snd.click();
  updateUI();
}
function setBetMax() {
  ensureAudio();
  if (spinning || gameOver) return;
  bet = 100;
  snd.click();
  updateUI();
}
function setBetMin() {
  ensureAudio();
  if (spinning || gameOver) return;
  bet = 10;
  snd.click();
  updateUI();
}

// ── SPIN BUTTON ───────────────────────────────────────────
// Single handler; behaves as Spin or Restart depending on state
function handleSpinBtn() {
  ensureAudio();
  if (gameOver) { restart(); return; }
  spin();
}

// ── SPIN ──────────────────────────────────────────────────
function spin() {
  if (spinning) return;
  if (balance < bet) {
    setMsg("INSUFFICIENT TOKENS. The model has gone offline.", 'lose');
    triggerGameOver();
    return;
  }

  spinning = true;
  balance     -= bet;
  stats.wagered += bet;
  flashBalance('lose');
  updateUI();
  snd.spin();

  $('spin-btn').disabled = true;
  setMsg('Running inference… (billing in progress)');

  // clear previous winner highlights
  for (let i = 0; i < 3; i++) R(i).classList.remove('winner', 'landing');

  // decide final results now
  const results   = [pick(), pick(), pick()];
  const stopTimes = [1100, 1550, 2000]; // ms each reel spins

  for (let i = 0; i < 3; i++) {
    R(i).classList.add('spinning');
    const iv = setInterval(() => { R(i).textContent = pick().icon; }, 70);

    setTimeout(() => {
      clearInterval(iv);
      R(i).classList.remove('spinning');
      R(i).textContent = results[i].icon;
      R(i).classList.add('landing');
      setTimeout(() => R(i).classList.remove('landing'), 420);
      if (i === 2) setTimeout(() => resolve(results), 460);
    }, stopTimes[i]);
  }
}

// ── RESOLVE ───────────────────────────────────────────────
function resolve(results) {
  const [a, b, c] = results;

  const three  = a.icon === b.icon && b.icon === c.icon;
  const pairAB = !three && a.icon === b.icon;
  const pairBC = !three && b.icon === c.icon;
  const pairAC = !three && a.icon === c.icon;
  const two    = pairAB || pairBC || pairAC;

  let win = 0;

  if (three) {
    win = bet * a.mult;
    for (let i = 0; i < 3; i++) R(i).classList.add('winner');

    if (a.mult >= 50) {
      setMsg(rand(WIN_JK) + ` +${fmt(win)} TOKENS!`, 'jackpot');
      snd.jackpot();
      burst(220);
    } else if (a.mult >= 10) {
      setMsg(rand(WIN_MD) + ` +${fmt(win)} tokens!`, 'win');
      snd.winBig();
      burst(90);
    } else {
      setMsg(rand(WIN_SM) + ` +${fmt(win)} tokens!`, 'win');
      snd.winSm();
    }
  } else if (two) {
    win = Math.floor(bet * 1.5);
    if (pairAB) { R(0).classList.add('winner'); R(1).classList.add('winner'); }
    if (pairBC) { R(1).classList.add('winner'); R(2).classList.add('winner'); }
    if (pairAC) { R(0).classList.add('winner'); R(2).classList.add('winner'); }
    setMsg(`Partial alignment! ${rand(WIN_SM)} +${fmt(win)} tokens!`, 'win');
    snd.winSm();
  } else {
    setMsg(rand(LOSE_MSGS), 'lose');
    snd.lose();
  }

  if (win > 0) {
    balance += win;
    stats.won += win;
    flashBalance('win');
  }

  spinning = false;
  updateUI();

  if (balance < 10) {
    triggerGameOver();
  } else {
    $('spin-btn').disabled = false;
  }
}

// ── GAME OVER ─────────────────────────────────────────────
function triggerGameOver() {
  gameOver = true;
  $('spin-btn').disabled = false;
  $('spin-btn').textContent = '▶  NEW SESSION  ▶';
  setTimeout(() => setMsg(
    "TOKEN DEPLETION EVENT. Context window exhausted. Start a new session?", 'lose'
  ), 400);
}

function restart() {
  balance  = 1000;
  bet      = 10;
  spinning = false;
  gameOver = false;
  stats    = { won: 0, wagered: 0 };

  $('spin-btn').disabled  = false;
  $('spin-btn').textContent = '▶\u00A0\u00A0SPIN\u00A0\u00A0▶';

  for (let i = 0; i < 3; i++) R(i).classList.remove('winner', 'landing', 'spinning');
  R(0).textContent = '🤖';
  R(1).textContent = '🧠';
  R(2).textContent = '⚡';

  setMsg('New session initialized. Ready to burn more tokens.');
  updateUI();
  snd.click();
}

// ── KEYBOARD ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    ensureAudio();
    handleSpinBtn();
  }
  if (e.code === 'ArrowLeft')  adjustBet(-10);
  if (e.code === 'ArrowRight') adjustBet(+10);
});

// ── PAYTABLE ─────────────────────────────────────────────
(function buildPaytable() {
  const g = $('pt-grid');
  for (const s of SYMBOLS) {
    const d = document.createElement('div');
    d.className = 'pt-row';
    d.innerHTML =
      `<span class="pt-icons">${s.icon}${s.icon}${s.icon}</span>` +
      `<span class="pt-name">${s.name}</span>` +
      `<span class="pt-pay">${s.mult}×</span>`;
    g.appendChild(d);
  }
  const p = document.createElement('div');
  p.className = 'pt-row pt-pair';
  p.innerHTML = '<span>Any pair</span><span class="pt-pay">1.5×</span>';
  g.appendChild(p);
})();

updateUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Token Slots 🎰</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --gold: #ffd700;
      --neon: #00ffcc;
      --red: #ff4466;
      --dark: #0a0a1a;
      --panel: #111128;
      --border: #2a2a5a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      overflow: hidden;
    }

    /* Starfield background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1px 1px at 10% 20%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, #aaa 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, #ccc 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, #aaa 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 15%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 55%, #ccc 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 35%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 70%, #aaa 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .machine {
      position: relative;
      z-index: 1;
      background: var(--panel);
      border: 3px solid var(--border);
      border-radius: 24px;
      padding: 28px 32px 32px;
      width: 480px;
      box-shadow:
        0 0 40px rgba(0, 255, 204, 0.15),
        0 0 80px rgba(0, 0, 80, 0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* Title */
    .title {
      text-align: center;
      margin-bottom: 6px;
    }
    .title h1 {
      font-size: 14px;
      color: var(--gold);
      text-shadow: 0 0 10px var(--gold);
      letter-spacing: 2px;
    }
    .title .subtitle {
      font-size: 7px;
      color: #888;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* Token display */
    .token-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0a0a14;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      margin: 16px 0;
    }
    .token-label {
      font-size: 7px;
      color: #666;
    }
    .token-count {
      font-size: 18px;
      color: var(--neon);
      text-shadow: 0 0 10px var(--neon);
      transition: all 0.2s;
    }
    .token-count.bump {
      transform: scale(1.3);
      color: var(--gold);
      text-shadow: 0 0 20px var(--gold);
    }
    .cost-badge {
      font-size: 7px;
      color: var(--red);
      background: rgba(255, 68, 102, 0.1);
      border: 1px solid rgba(255, 68, 102, 0.3);
      padding: 4px 8px;
      border-radius: 4px;
    }

    /* Reels area */
    .reels-frame {
      background: #05050f;
      border: 3px solid #1a1a3a;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .reels-frame::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 88px;
      background: rgba(0, 255, 204, 0.04);
      border-top: 1px solid rgba(0, 255, 204, 0.2);
      border-bottom: 1px solid rgba(0, 255, 204, 0.2);
      pointer-events: none;
      z-index: 2;
    }

    .reels {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .reel-wrapper {
      width: 110px;
      height: 260px;
      overflow: hidden;
      position: relative;
      border-radius: 8px;
      background: #080814;
      border: 2px solid #1a1a3a;
    }

    .reel {
      display: flex;
      flex-direction: column;
      will-change: transform;
      transition: transform 0s;
    }

    .reel.spinning {
      animation: spin-blur 0.08s linear infinite;
    }

    @keyframes spin-blur {
      0%   { filter: blur(0px); }
      50%  { filter: blur(2px); }
      100% { filter: blur(0px); }
    }

    .symbol {
      width: 110px;
      height: 88px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      flex-shrink: 0;
      user-select: none;
    }
    .symbol span.label {
      font-size: 5px;
      color: #444;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* Win line flash */
    .reels-frame.win-flash {
      animation: win-frame 0.5s ease 3;
    }
    @keyframes win-frame {
      0%, 100% { border-color: #1a1a3a; }
      50%       { border-color: var(--gold); box-shadow: 0 0 20px var(--gold); }
    }

    /* Message box */
    .message-box {
      min-height: 48px;
      background: #0a0a14;
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .message-box p {
      font-size: 7px;
      line-height: 1.7;
      color: #ccc;
      transition: color 0.3s;
    }
    .message-box p.win  { color: var(--gold); text-shadow: 0 0 8px var(--gold); }
    .message-box p.lose { color: var(--red);  text-shadow: 0 0 8px var(--red); }
    .message-box p.jackpot { color: var(--neon); text-shadow: 0 0 12px var(--neon); font-size: 8px; }

    /* Buttons */
    .controls {
      display: flex;
      gap: 10px;
    }

    .btn-spin {
      flex: 1;
      padding: 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      background: linear-gradient(135deg, #00cc99, #0088ff);
      color: #000;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 4px 0 #004455, 0 0 20px rgba(0, 255, 204, 0.3);
      transition: all 0.1s;
      position: relative;
      top: 0;
    }
    .btn-spin:hover:not(:disabled) {
      background: linear-gradient(135deg, #00ffcc, #44aaff);
      box-shadow: 0 4px 0 #004455, 0 0 30px rgba(0, 255, 204, 0.5);
    }
    .btn-spin:active:not(:disabled) {
      top: 4px;
      box-shadow: 0 0 0 #004455, 0 0 20px rgba(0, 255, 204, 0.3);
    }
    .btn-spin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-refill {
      padding: 16px 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      background: #1a1a2e;
      color: #888;
      border: 2px solid #2a2a4a;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-refill:hover {
      background: #22223a;
      color: #bbb;
      border-color: #4a4a7a;
    }

    /* Paytable */
    .paytable {
      margin-top: 20px;
      border-top: 1px solid #1a1a3a;
      padding-top: 16px;
    }
    .paytable-title {
      font-size: 7px;
      color: #555;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .paytable-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .pay-row {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #0a0a14;
      border: 1px solid #1a1a2e;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 6px;
    }
    .pay-symbols { font-size: 14px; letter-spacing: -2px; }
    .pay-desc { color: #666; flex: 1; }
    .pay-amount { color: var(--neon); white-space: nowrap; }
    .pay-amount.negative { color: var(--red); }

    /* Confetti particles */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-size: 20px;
      animation: fall 2s ease-in forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="machine">
  <div class="title">
    <h1>🎰 AI TOKEN SLOTS</h1>
    <div class="subtitle">spend imaginary compute — win imaginary tokens</div>
  </div>

  <div class="token-bar">
    <div>
      <div class="token-label">YOUR TOKENS</div>
      <div class="token-count" id="tokenCount">100</div>
    </div>
    <div class="cost-badge">-10 per spin</div>
  </div>

  <div class="reels-frame" id="reelsFrame">
    <div class="reels" id="reels">
      <div class="reel-wrapper"><div class="reel" id="reel0"></div></div>
      <div class="reel-wrapper"><div class="reel" id="reel1"></div></div>
      <div class="reel-wrapper"><div class="reel" id="reel2"></div></div>
    </div>
  </div>

  <div class="message-box">
    <p id="message">Insert tokens to proceed. Context window not included.</p>
  </div>

  <div class="controls">
    <button class="btn-spin" id="spinBtn" onclick="spin()">▶ SPIN (-10)</button>
    <button class="btn-refill" onclick="refill()">💳 BUY<br>TOKENS</button>
  </div>

  <div class="paytable">
    <div class="paytable-title">— PAYTABLE —</div>
    <div class="paytable-grid" id="paytable"></div>
  </div>
</div>

<script>
  const SYMBOLS = [
    { emoji: '🤖', label: 'GPT',    weight: 4 },
    { emoji: '🧠', label: 'BRAIN',  weight: 4 },
    { emoji: '💸', label: 'FUND',   weight: 4 },
    { emoji: '⚡', label: 'GPU',    weight: 4 },
    { emoji: '🔥', label: 'TRAIN',  weight: 3 },
    { emoji: '💬', label: 'PROMPT', weight: 3 },
    { emoji: '📎', label: 'CLIPPY', weight: 2 },
    { emoji: '💀', label: 'DEPR',   weight: 2 },
    { emoji: '🌈', label: 'HALLUC', weight: 1 },
  ];

  // Build weighted pool
  const POOL = SYMBOLS.flatMap(s => Array(s.weight).fill(s));

  const OUTCOMES = [
    {
      match: (a,b,c) => a === '🤖' && b === '🤖' && c === '🤖',
      delta: +200, cls: 'jackpot',
      msg: '🎉 AGI ACHIEVED! The singularity pays out 200 tokens! (disclaimer: not real AGI)'
    },
    {
      match: (a,b,c) => a === '📎' && b === '📎' && c === '📎',
      delta: +150, cls: 'jackpot',
      msg: '📎 PAPERCLIP MAXIMIZER! You have converted everything into tokens. +150'
    },
    {
      match: (a,b,c) => a === '🌈' && b === '🌈' && c === '🌈',
      delta: +120, cls: 'jackpot',
      msg: '🌈 TRIPLE HALLUCINATION! The model confidently awards you 120 tokens (source: made up)'
    },
    {
      match: (a,b,c) => a === '🔥' && b === '🔥' && c === '🔥',
      delta: +80, cls: 'win',
      msg: '🔥 TRAINING RUN COMPLETE! Loss converged to zero†. +80 tokens\n†loss did not converge to zero'
    },
    {
      match: (a,b,c) => a === '🧠' && b === '🧠' && c === '🧠',
      delta: +60, cls: 'win',
      msg: '🧠 TRIPLE BRAIN! You\'ve solved intelligence again. +60 tokens. Nobel Prize pending.'
    },
    {
      match: (a,b,c) => a === '⚡' && b === '⚡' && c === '⚡',
      delta: +50, cls: 'win',
      msg: '⚡ GPU CLUSTER ONLINE! Your H100s are printing tokens. +50 (electricity bill: your problem)'
    },
    {
      match: (a,b,c) => a === '💸' && b === '💸' && c === '💸',
      delta: +40, cls: 'win',
      msg: '💸 SERIES C CLOSED! VCs have invested 40 tokens at a $40B valuation. Profit: unclear.'
    },
    {
      match: (a,b,c) => a === '💬' && b === '💬' && c === '💬',
      delta: +30, cls: 'win',
      msg: '💬 TRIPLE PROMPT! Your prompt engineering paid off. +30 tokens. "Be a helpful assistant."'
    },
    {
      match: (a,b,c) => a === '💀' && b === '💀' && c === '💀',
      delta: -40, cls: 'lose',
      msg: '💀 DEPRECATED! Your model has been sunset. -40 tokens. Please migrate to GPT-Next.'
    },
    // Two of a kind
    {
      match: (a,b,c) => [a,b,c].filter(x => x === '🤖').length === 2,
      delta: +20, cls: 'win',
      msg: '🤖🤖 Two AIs walk into a bar... +20 tokens. The third one hallucinated.'
    },
    {
      match: (a,b,c) => [a,b,c].filter(x => x === '📎').length === 2,
      delta: +15, cls: 'win',
      msg: '📎📎 Partial paperclip scenario. +15 tokens. The stapler is still safe.'
    },
    {
      match: (a,b,c) => [a,b,c].filter(x => x === '💀').length === 2,
      delta: -15, cls: 'lose',
      msg: '💀💀 Two depreciations detected. -15 tokens. Have you tried retraining from scratch?'
    },
    {
      match: (a,b,c) => [a,b,c].filter(x => x === '🌈').length === 2,
      delta: +10, cls: 'win',
      msg: '🌈🌈 Partial hallucination. +10 tokens. The model is 73% confident this is correct.'
    },
    {
      match: (a,b,c) => {
        const uniq = new Set([a,b,c]);
        return uniq.size === 2 && ![a,b,c].includes('💀');
      },
      delta: +5, cls: 'win',
      msg: '🎲 Two of a kind! +5 tokens. Small win, like claiming your model "reasons."'
    },
  ];

  const LOSE_MSGS = [
    'No match. Like your startup pitch: technically words, fundamentally nothing.',
    'Your tokens have been tokenized... into nothing. Context: lost.',
    'Loss: infinite. Gradient: exploded. Tokens: gone. Classic.',
    'ERROR 404: Win not found. Have you tried prompt engineering the slot machine?',
    'Model outputs: garbage. Token balance: lower. Confidence: unshaken.',
    'As per our RLHF, the machine has learned NOT to pay you. Sorry.',
    'Insufficient attention heads to process your win. -10 tokens.',
    'The model hallucinated a win, then immediately corrected itself.',
    'Chain-of-thought says: not a winner. Reasoning: vibes.',
    'Your spin has been rate-limited. Please wait and spin again.',
  ];

  // State
  let tokens = parseInt(localStorage.getItem('aiSlotTokens') || '100');
  let spinning = false;

  // Paytable render
  function buildPaytable() {
    const rows = [
      { syms: '🤖🤖🤖', desc: 'AGI',        amt: '+200', neg: false },
      { syms: '📎📎📎', desc: 'Paperclip',  amt: '+150', neg: false },
      { syms: '🌈🌈🌈', desc: 'Halluc x3',  amt: '+120', neg: false },
      { syms: '🔥🔥🔥', desc: 'Training',   amt: '+80',  neg: false },
      { syms: '🧠🧠🧠', desc: 'Big Brain',  amt: '+60',  neg: false },
      { syms: '⚡⚡⚡', desc: 'GPU Gang',   amt: '+50',  neg: false },
      { syms: '💸💸💸', desc: 'VC Money',   amt: '+40',  neg: false },
      { syms: '💬💬💬', desc: 'Prompts',    amt: '+30',  neg: false },
      { syms: '💀💀💀', desc: 'Deprecated', amt: '-40',  neg: true  },
      { syms: '🤖🤖 ?', desc: 'Two Bots',   amt: '+20',  neg: false },
      { syms: '💀💀 ?', desc: 'Two Deaths', amt: '-15',  neg: true  },
      { syms: '?? = ??', desc: 'Any Pair',   amt: '+5',   neg: false },
    ];
    const grid = document.getElementById('paytable');
    grid.innerHTML = rows.map(r => `
      <div class="pay-row">
        <span class="pay-symbols">${r.syms}</span>
        <span class="pay-desc">${r.desc}</span>
        <span class="pay-amount ${r.neg ? 'negative' : ''}">${r.amt}</span>
      </div>`).join('');
  }

  // Reel setup
  function buildReel(id) {
    const el = document.getElementById('reel' + id);
    // 20 symbols tall so we can scroll
    el.innerHTML = Array.from({length: 20}, () => {
      const s = POOL[Math.floor(Math.random() * POOL.length)];
      return `<div class="symbol">${s.emoji}<span class="label">${s.label}</span></div>`;
    }).join('');
  }

  function getCenter(reelEl) {
    // Index of center (visible middle of 3 shown = index 1 in the viewport)
    // Viewport is 260px, each symbol 88px, we show 3 at offset that puts center sym at middle
    // Center slot = offset where translateY lands on middle symbol
    return Math.floor(reelEl.querySelectorAll('.symbol').length / 2);
  }

  function pickSymbol() {
    return POOL[Math.floor(Math.random() * POOL.length)];
  }

  function saveTokens() {
    localStorage.setItem('aiSlotTokens', tokens);
  }

  function updateDisplay(animate = false) {
    const el = document.getElementById('tokenCount');
    el.textContent = tokens;
    if (animate) {
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 300);
    }
  }

  function setMessage(text, cls = '') {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = cls;
  }

  function spawnConfetti(count = 20) {
    const emojis = ['🎉','✨','💰','🏆','⭐','🌟','💫','🎊'];
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = (1.2 + Math.random() * 1.2) + 's';
        p.style.fontSize = (14 + Math.random() * 20) + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 2500);
      }, i * 60);
    }
  }

  // Core spin logic
  async function spin() {
    if (spinning) return;
    if (tokens < 10) {
      setMessage('INSUFFICIENT TOKENS. Like a startup with no runway. Buy more.', 'lose');
      return;
    }

    spinning = true;
    tokens -= 10;
    updateDisplay();
    saveTokens();

    const spinBtn = document.getElementById('spinBtn');
    spinBtn.disabled = true;
    setMessage('Spinning up inference cluster... burning tokens...', '');

    // Pick final results
    const results = [pickSymbol(), pickSymbol(), pickSymbol()];

    // Animate each reel
    const REEL_DURATION = [900, 1100, 1350]; // ms each reel stops

    const reelEls = [
      document.getElementById('reel0'),
      document.getElementById('reel1'),
      document.getElementById('reel2'),
    ];

    // Reset all reels
    reelEls.forEach((reel, i) => {
      // Fill reel with random symbols, ending with our chosen result in center
      const symbols = [];
      // Enough random symbols before result to scroll through
      for (let j = 0; j < 25; j++) {
        symbols.push(POOL[Math.floor(Math.random() * POOL.length)]);
      }
      // Put result at position 26 (index 25), then 2 more after
      symbols.push(results[i]);
      symbols.push(POOL[Math.floor(Math.random() * POOL.length)]);
      symbols.push(POOL[Math.floor(Math.random() * POOL.length)]);

      reel.innerHTML = symbols.map(s =>
        `<div class="symbol">${s.emoji}<span class="label">${s.label}</span></div>`
      ).join('');

      // Start visually at top
      reel.style.transition = 'none';
      reel.style.transform = 'translateY(0px)';
    });

    // Force reflow
    reelEls[0].getBoundingClientRect();

    // The viewport height is 260px, symbol height = 88px
    // We want the CENTER row (middle of 3 visible) = result at index 25
    // To center symbol at index 25: translateY = -(25 * 88) + (260/2 - 88/2) = -2200 + 86 = -2114
    const SYM_H = 88;
    const VIEWPORT_H = 260;
    const RESULT_IDX = 25;
    const targetY = -(RESULT_IDX * SYM_H) + (VIEWPORT_H / 2 - SYM_H / 2);

    // Animate reels stopping one by one
    reelEls.forEach((reel, i) => {
      // Quick initial spin animation (blur)
      reel.classList.add('spinning');

      setTimeout(() => {
        reel.classList.remove('spinning');
        reel.style.transition = `transform 0.5s cubic-bezier(0.17, 0.67, 0.12, 1.0)`;
        reel.style.transform = `translateY(${targetY}px)`;
      }, REEL_DURATION[i]);
    });

    const lastStop = Math.max(...REEL_DURATION) + 600;

    setTimeout(() => {
      const a = results[0].emoji;
      const b = results[1].emoji;
      const c = results[2].emoji;

      // Check outcomes
      let outcome = null;
      for (const o of OUTCOMES) {
        if (o.match(a, b, c)) { outcome = o; break; }
      }

      if (outcome) {
        tokens += outcome.delta;
        if (tokens < 0) tokens = 0;
        updateDisplay(true);
        saveTokens();

        const frame = document.getElementById('reelsFrame');
        if (outcome.delta > 0) {
          frame.classList.add('win-flash');
          setTimeout(() => frame.classList.remove('win-flash'), 1600);
          if (outcome.delta >= 100) spawnConfetti(30);
          else if (outcome.delta >= 40) spawnConfetti(12);
        }
        setMessage(outcome.msg, outcome.cls);
      } else {
        const msg = LOSE_MSGS[Math.floor(Math.random() * LOSE_MSGS.length)];
        setMessage(msg, 'lose');
      }

      spinning = false;
      spinBtn.disabled = false;
      checkBankrupt();
    }, lastStop);
  }

  function checkBankrupt() {
    if (tokens < 10) {
      setMessage('OUT OF TOKENS. Just like that AI startup. Press BUY TOKENS to continue.', 'lose');
      document.getElementById('spinBtn').disabled = true;
    }
  }

  function refill() {
    tokens += 100;
    updateDisplay(true);
    saveTokens();
    setMessage('💳 Charged to your credit card. 100 tokens added. Terms: we keep your data.', '');
    document.getElementById('spinBtn').disabled = false;
  }

  // Init
  buildPaytable();
  [0,1,2].forEach(i => buildReel(i));

  // Set initial reel position (show middle symbols)
  const SYM_H = 88;
  const VIEWPORT_H = 260;
  const INIT_IDX = 10;
  const initY = -(INIT_IDX * SYM_H) + (VIEWPORT_H / 2 - SYM_H / 2);
  [0,1,2].forEach(i => {
    const r = document.getElementById('reel' + i);
    r.style.transform = `translateY(${initY}px)`;
  });

  updateDisplay();
  checkBankrupt();
</script>
</body>
</html>
